name: Update results

# Auto-updates index.html with finished match results (group stage AND knockouts)
# from the worldcup26.ir API, then commits the change back so GitHub Pages
# redeploys. Two independent scripts run in sequence:
#   • update_results.py    rewrites the group-stage RESULTS array
#   • update_knockouts.py  rewrites the KO_RESULTS array
# Each only ever touches its own array and has a no-shrink guard, so a bad API
# response can't wipe entered scores.

on:
  schedule:
    # IMPORTANT: cron runs in UTC, and the times below are written for BST
    # (UTC+1, British Summer Time — in effect during the tournament). If the UK
    # moves to GMT (UTC+0) you'd shift each line +1 hour.
    # Schedule (BST): hourly from 22:00 through 06:00, plus 09:00 and 12:00.
    # GitHub cron is best-effort and can be delayed/dropped under load, but
    # hourly attempts across the overnight window keep the hit-rate high.
    - cron: "0 21 * * *"   # 22:00 BST
    - cron: "0 22 * * *"   # 23:00 BST
    - cron: "0 23 * * *"   # 00:00 BST
    - cron: "0 0 * * *"    # 01:00 BST
    - cron: "0 1 * * *"    # 02:00 BST
    - cron: "0 2 * * *"    # 03:00 BST
    - cron: "0 3 * * *"    # 04:00 BST
    - cron: "0 4 * * *"    # 05:00 BST
    - cron: "0 5 * * *"    # 06:00 BST
    - cron: "0 8 * * *"    # 09:00 BST
    - cron: "0 11 * * *"   # 12:00 BST
  # Lets you trigger it by hand from the Actions tab (handy for testing or to
  # pull a result the moment a game finishes rather than waiting for the cron).
  workflow_dispatch:

# The job needs permission to push the commit back to the repo.
permissions:
  contents: write

# Avoid overlapping runs if one is slow.
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update group-stage results
        run: python update_results.py

      - name: Update knockout results
        run: python update_knockouts.py

      # Refresh team Elo ratings from eloratings.net. Ratings drift slowly, so a
      # blip here shouldn't block a score commit — continue-on-error keeps the run
      # green and the script self-skips when nothing changed.
      - name: Update team Elo ratings
        continue-on-error: true
        run: python update_elo.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update results and ratings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Committed updates."
          else
            echo "No changes to commit."
          fi
