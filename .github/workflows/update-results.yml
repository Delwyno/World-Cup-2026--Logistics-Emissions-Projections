name: Update results

# Auto-updates index.html with finished match results (group stage AND knockouts)
# from the worldcup26.ir API, then commits the change back so GitHub Pages
# redeploys. Two independent scripts run in sequence:
#   • update_results.py    rewrites the group-stage RESULTS array
#   • update_knockouts.py  rewrites the KO_RESULTS array
# Each only ever touches its own array and has a no-shrink guard, so a bad API
# response can't wipe entered scores.

on:
  schedule:
    # Cron is UTC and best-effort (may lag a few minutes under load). The spread
    # below catches finished games a few hours after they end, across the
    # US/Can/Mex evening windows plus a couple of daytime sweeps. Roughly every
    # 30 min through the busy overnight window, then hourly-ish in the day.
    - cron: "0,30 22 * * *"
    - cron: "0,30 23 * * *"
    - cron: "0,30 0 * * *"
    - cron: "0,30 1 * * *"
    - cron: "0,30 2 * * *"
    - cron: "0,30 3 * * *"
    - cron: "0,30 4 * * *"
    - cron: "0,30 5 * * *"
    - cron: "0 6 * * *"
    - cron: "0 7 * * *"
    - cron: "0 10 * * *"
    - cron: "0 15 * * *"
  # Lets you trigger it by hand from the Actions tab (handy for testing or to
  # pull a result the moment a game finishes rather than waiting for the cron).
  workflow_dispatch:

# The job needs permission to push the commit back to the repo.
permissions:
  contents: write

# Avoid overlapping runs if one is slow.
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update group-stage results
        run: python update_results.py

      - name: Update knockout results
        run: python update_knockouts.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Auto-update results ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Committed updated results."
          else
            echo "No changes to commit."
          fi
