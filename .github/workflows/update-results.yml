name: Update results

# Post-tournament: manual-only maintenance workflow.
#
# During the tournament this ran on a schedule, pulling finished match results
# from the worldcup26.ir API and committing them back so GitHub Pages redeployed.
# The tournament is over, so the schedule has been removed and the steps below
# are effectively no-ops against the API — each script has a no-shrink guard and
# will simply report nothing to do.
#
# It is kept because the later steps are still genuinely useful:
#   • update_history.py   regenerate title_history.json
#   • validate_site.py    check index.html still parses and its data is intact
# Run it by hand after editing any of the scripts, or to re-validate the page.

# The tournament finished on 19 July 2026, so the scheduled runs have been
# removed — there are no more results to fetch. The workflow is kept as a
# manual-only tool: useful for re-running a script after editing it, or for
# regenerating title_history.json / re-validating the page.
on:
  # Manual trigger only (Actions tab -> Update results -> Run workflow).
  workflow_dispatch:

# The job needs permission to push the commit back to the repo.
permissions:
  contents: write

# Avoid overlapping runs if one is slow.
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Update group-stage results
        run: python update_results.py

      - name: Update knockout results
        run: python update_knockouts.py

      # Refresh team Elo ratings from eloratings.net. Ratings drift slowly, so a
      # blip here shouldn't block a score commit — continue-on-error keeps the run
      # green and the script self-skips when nothing changed.
      - name: Update team Elo ratings
        continue-on-error: true
        run: python update_elo.py

      # Snapshot current title odds into title_history.json (one entry per UTC
      # day, overwritten in place on same-day re-runs) so the dashboard can plot
      # a real trend line instead of only a Day-1-vs-now comparison. Soft-fails
      # (exits 0) if it can't compute odds, so a snapshot miss never blocks a
      # score commit.
      - name: Snapshot title-odds history
        run: python update_history.py

      - name: Validate site
        run: python validate_site.py

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain index.html title_history.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html title_history.json
            git commit -m "Auto-update results and ratings ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Committed updates."
          else
            echo "No changes to commit."
          fi

